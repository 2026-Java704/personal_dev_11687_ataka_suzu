<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>新規登録</title>
	<link rel="stylesheet" href="/css/style.css">
</head>

<body>
	<header th:replace="~{header}"></header>
	<hr>
	<main>


		<form action="/users/add" method="post" class="form-card">

			<h2>新規登録</h2>


			<div th:if="${errorList}" style="margin-bottom: 1.5rem; text-align: center;">
				<div th:each="error : ${errorList}" th:text="${error}"
					style="color: #ff6b6b; font-size: 14px; font-weight: 500; margin-bottom: 5px;"></div>
			</div>


			<div style="margin-bottom: 1.2rem;">
				<label style="display: block; margin-bottom: 0.4rem; font-size: 15px; color: #555;">名前</label>
				<input type="text" name="name" placeholder="名前" th:value="${name}">
			</div>

			<div style="margin-bottom: 1.2rem;">
				<label style="display: block; margin-bottom: 0.4rem; font-size: 15px; color: #555;">パスワード</label>
				<input type="password" name="password" placeholder="パスワード">
			</div>


			<button>登録</button>


			<div style="text-align: center; margin-top: 1.5rem;">
				<a href="/login">ログイン画面へ戻る</a>
			</div>
		</form>

	</main>
</body>

</html>
