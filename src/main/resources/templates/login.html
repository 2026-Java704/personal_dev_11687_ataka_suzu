<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>ログイン</title>
	<link rel="stylesheet" href="/css/style.css">
</head>

<body>
	<header th:replace="~{header}"></header>
	<hr>
	<main>
		<form action="/login" method="post">
			<input type="text" name="name" placeholder="名前" th:value="${name}"><br>
			<input type="text" name="password" placeholder="パスワード"><br>
			<button>ログイン</button>
			<br> <span th:text="${message}" style="color: red"></span>
		</form>
		<!--		<p>デモ用アカウント: demo / demo</p>-->
		<a href="/users/new">新規登録</a>
	</main>
</body>

</html>
