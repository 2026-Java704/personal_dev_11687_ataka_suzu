<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>ログイン</title>
	<link rel="stylesheet" href="/css/style.css">
</head>

<body>
	<header th:replace="~{header}"></header>
	<hr>
	<main>

		<form action="/login" method="post" class="form-card">

			<h2>ログイン</h2>


			<div th:if="${message}" style="margin-bottom: 1.5rem; text-align: center;">
				<span th:text="${message}" style="color: #ff6b6b; font-size: 14px; font-weight: 500;"></span>
			</div>

			<div style="margin-bottom: 1.2rem;">
				<label style="display: block; margin-bottom: 0.4rem; font-size: 15px; color: #555;">名前</label>
				<input type="text" name="name" placeholder="名前" th:value="${name}">
			</div>

			<div style="margin-bottom: 1.2rem;">
				<label style="display: block; margin-bottom: 0.4rem; font-size: 15px; color: #555;">パスワード</label>
				<input type="password" name="password" placeholder="パスワード">
			</div>

			<!--			<div class="form-check">-->
			<!--				<input type="checkbox" id="remember" class="form-check-input">-->
			<!--				<label for="remember" class="form-check-label">ログイン状態を保持する</label>-->
			<!--			</div>-->

			<button>ログイン</button>

			<div style="text-align: center; margin-top: 1.5rem;">
				<a href="/users/new">新規登録</a>
			</div>
		</form>

	</main>
</body>

</html>
